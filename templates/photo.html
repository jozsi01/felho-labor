<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>{{ photo.name }}</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        img { max-width: 100%; height: auto; border: 1px solid #ccc; padding: 5px; }
        .back-link { display: block; margin-top: 20px; text-decoration: none; color: blue; }
    </style>
</head>
<body>
    <h1>{{ photo.name }}</h1>
    <p>Feltöltve: {{ photo.upload_date.strftime('%Y-%m-%d %H:%M') }}</p>
    
    <img src="{{ url_for('uploaded_file', filename=photo.filename) }}" alt="{{ photo.name }}">
    
    <a href="{{ url_for('index') }}" class="back-link">&larr; Vissza a listához</a>
</body>
</html>
